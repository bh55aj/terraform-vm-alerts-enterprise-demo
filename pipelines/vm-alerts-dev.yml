# ===========================================================================
# pipelines/vm-alerts-dev.yml
#
# Azure DevOps YAML Pipeline — VM Alerts DEV Environment
#
# This pipeline deploys the action_group and vm-alerts Terraform modules
# to the dev environment. It demonstrates:
#   - Scheduled daily runs
#   - Terraform init / validate / plan / apply
#   - tfvars injection pattern
#   - action_group output wiring into vm-alerts
#   - Service connection and Variable Group usage
#
# PLACEHOLDERS (replace before running):
#   - YOUR_SERVICE_CONNECTION : Azure DevOps service connection name
#   - YOUR_VARIABLE_GROUP     : Azure DevOps Variable Group name
#   - YOUR_STORAGE_ACCOUNT    : Azure Storage Account for backend state
#   - YOUR_RESOURCE_GROUP     : Resource Group for Terraform state
# ===========================================================================

trigger:
  branches:
      include:
            - main

            # Daily scheduled run at 06:00 UTC
            schedules:
              - cron: "0 6 * * *"
                  displayName: Daily 06:00 UTC
                      branches:
                            include:
                                    - main
                                        always: false  # Only run if there are new commits

                                        variables:
                                          - group: YOUR_VARIABLE_GROUP  # Contains: ARM_SUBSCRIPTION_ID, ARM_TENANT_ID, etc.
                                            - name: TF_VERSION
                                                value: "1.7.0"
                                                  - name: WORKING_DIR_AG
                                                      value: "terraform-scripts/dev/action_group"
                                                        - name: WORKING_DIR_ALERTS
                                                            value: "terraform-scripts/dev/vm-alerts"
                                                              - name: BACKEND_RG
                                                                  value: "rg-terraform-state"
                                                                    - name: BACKEND_SA
                                                                        value: "YOUR_STORAGE_ACCOUNT"
                                                                          - name: BACKEND_CONTAINER
                                                                              value: "tfstate"

                                                                              pool:
                                                                                vmImage: "ubuntu-latest"

                                                                                stages:

                                                                                  # =========================================================================
                                                                                    # STAGE 1: Deploy Action Group
                                                                                      # Creates the Azure Monitor Action Group and captures its resource ID
                                                                                        # =========================================================================
                                                                                          - stage: DeployActionGroup
                                                                                              displayName: "Deploy Action Group (DEV)"
                                                                                                  jobs:
                                                                                                        - job: TerraformActionGroup
                                                                                                                displayName: "Terraform - Action Group"
                                                                                                                        steps:
                                                                                                                        
                                                                                                                                  - task: TerraformInstaller@1
                                                                                                                                              displayName: "Install Terraform $(TF_VERSION)"
                                                                                                                                                          inputs:
                                                                                                                                                                        terraformVersion: "$(TF_VERSION)"
                                                                                                                                                                        
                                                                                                                                                                                  # Service principal auth is injected via the Service Connection
                                                                                                                                                                                            # ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_SUBSCRIPTION_ID, ARM_TENANT_ID
                                                                                                                                                                                                      # are set automatically by the AzureCLI task or via Variable Group
                                                                                                                                                                                                                - task: AzureCLI@2
                                                                                                                                                                                                                            displayName: "Terraform Init - Action Group"
                                                                                                                                                                                                                                        inputs:
                                                                                                                                                                                                                                                      azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                    scriptType: "bash"
                                                                                                                                                                                                                                                                                  scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                workingDirectory: "$(WORKING_DIR_AG)"
                                                                                                                                                                                                                                                                                                              inlineScript: |
                                                                                                                                                                                                                                                                                                                              terraform init \
                                                                                                                                                                                                                                                                                                                                                -backend-config="resource_group_name=$(BACKEND_RG)" \
                                                                                                                                                                                                                                                                                                                                                                  -backend-config="storage_account_name=$(BACKEND_SA)" \
                                                                                                                                                                                                                                                                                                                                                                                    -backend-config="container_name=$(BACKEND_CONTAINER)" \
                                                                                                                                                                                                                                                                                                                                                                                                      -backend-config="key=dev/action_group/terraform.tfstate"
                                                                                                                                                                                                                                                                                                                                                                                                                  env:
                                                                                                                                                                                                                                                                                                                                                                                                                                ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                                                                                                                                                                                                                                                                                                                                                                                                                                                            ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ARM_TENANT_ID: $(ARM_TENANT_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                displayName: "Terraform Validate - Action Group"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    workingDirectory: "$(WORKING_DIR_AG)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  terraform validate
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        displayName: "Terraform Plan - Action Group"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            workingDirectory: "$(WORKING_DIR_AG)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # tfvars are injected from the Variable Group via environment variables
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # or via a secure file download (not committed to source control)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          terraform plan \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            -var="resource_group_name=$(AG_RESOURCE_GROUP)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              -var="action_group_name=$(AG_NAME)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -var="action_group_short_name=$(AG_SHORT_NAME)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  -out=tfplan-ag
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ARM_TENANT_ID: $(ARM_TENANT_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            displayName: "Terraform Apply - Action Group"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                workingDirectory: "$(WORKING_DIR_AG)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              terraform apply -auto-approve tfplan-ag
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Capture the action_group_id output for use in the next stage
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ACTION_GROUP_ID=$(terraform output -raw action_group_id)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "##vso[task.setvariable variable=ACTION_GROUP_ID;isOutput=true]$ACTION_GROUP_ID"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "Action Group ID: $ACTION_GROUP_ID"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          name: ApplyActionGroup
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ARM_TENANT_ID: $(ARM_TENANT_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # =========================================================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # STAGE 2: Deploy VM Alerts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # Consumes the action_group_id output from Stage 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # =========================================================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - stage: DeployVmAlerts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            displayName: "Deploy VM Alerts (DEV)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                dependsOn: DeployActionGroup
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    variables:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Capture action_group_id from the previous stage output
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ACTION_GROUP_ID: $[ stageDependencies.DeployActionGroup.TerraformActionGroup.outputs['ApplyActionGroup.ACTION_GROUP_ID'] ]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    jobs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - job: TerraformVmAlerts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  displayName: "Terraform - VM Alerts"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - task: TerraformInstaller@1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                displayName: "Install Terraform $(TF_VERSION)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          terraformVersion: "$(TF_VERSION)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                displayName: "Terraform Init - VM Alerts"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    workingDirectory: "$(WORKING_DIR_ALERTS)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  terraform init \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -backend-config="resource_group_name=$(BACKEND_RG)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      -backend-config="storage_account_name=$(BACKEND_SA)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -backend-config="container_name=$(BACKEND_CONTAINER)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          -backend-config="key=dev/vm-alerts/terraform.tfstate"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ARM_TENANT_ID: $(ARM_TENANT_ID)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    displayName: "Terraform Validate - VM Alerts"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        workingDirectory: "$(WORKING_DIR_ALERTS)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      terraform validate
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            displayName: "Terraform Plan - VM Alerts"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                workingDirectory: "$(WORKING_DIR_ALERTS)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # action_group_id is wired in from Stage 1 output — no hardcoding!
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              terraform plan \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -var="resource_group_name=$(ALERTS_RESOURCE_GROUP)" \
