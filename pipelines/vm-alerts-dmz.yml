# ===========================================================================
# pipelines/vm-alerts-dmz.yml
#
# Azure DevOps YAML Pipeline — VM Alerts DMZ Environment
#
# PLACEHOLDERS (replace before running):
#   - YOUR_SERVICE_CONNECTION : Azure DevOps service connection name
#   - YOUR_VARIABLE_GROUP     : Azure DevOps Variable Group name
#   - YOUR_STORAGE_ACCOUNT    : Azure Storage Account for backend state
#   - YOUR_RESOURCE_GROUP     : Resource Group for Terraform state
# ===========================================================================

trigger:
  branches:
      include:
            - main
              paths:
                  include:
                        - terraform-scripts/dmz/**
                              - modules/**

                              pr: none

                              variables:
                                - group: YOUR_VARIABLE_GROUP
                                  - name: TF_VERSION
                                      value: "1.5.7"
                                        - name: ENV
                                            value: "dmz"

                                            pool:
                                              vmImage: "ubuntu-latest"

                                              stages:
                                                # ---------------------------------------------------------------------------
                                                  # Stage 1: Deploy DMZ Action Group
                                                    # ---------------------------------------------------------------------------
                                                      - stage: DeployActionGroup_DMZ
                                                          displayName: "Deploy DMZ Action Group"
                                                              jobs:
                                                                    - job: TerraformActionGroup
                                                                            displayName: "Terraform - DMZ Action Group"
                                                                                    steps:
                                                                                              - task: TerraformInstaller@1
                                                                                                          inputs:
                                                                                                                        terraformVersion: $(TF_VERSION)
                                                                                                                        
                                                                                                                                  - task: AzureCLI@2
                                                                                                                                              displayName: "Terraform Init - DMZ Action Group"
                                                                                                                                                          inputs:
                                                                                                                                                                        azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                      scriptType: "bash"
                                                                                                                                                                                                    scriptLocation: "inlineScript"
                                                                                                                                                                                                                  inlineScript: |
                                                                                                                                                                                                                                  terraform -chdir=terraform-scripts/dmz/action_group init \
                                                                                                                                                                                                                                                    -backend-config="storage_account_name=YOUR_STORAGE_ACCOUNT" \
                                                                                                                                                                                                                                                                      -backend-config="container_name=tfstate-dmz" \
                                                                                                                                                                                                                                                                                        -backend-config="key=dmz/action_group/terraform.tfstate" \
                                                                                                                                                                                                                                                                                                          -backend-config="resource_group_name=YOUR_RESOURCE_GROUP"
                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                    - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                displayName: "Terraform Validate - DMZ Action Group"
                                                                                                                                                                                                                                                                                                                                            inputs:
                                                                                                                                                                                                                                                                                                                                                          azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                        scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                      scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                    inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                    terraform -chdir=terraform-scripts/dmz/action_group validate
                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                              - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                          displayName: "Terraform Plan - DMZ Action Group"
                                                                                                                                                                                                                                                                                                                                                                                                                                                      inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              terraform -chdir=terraform-scripts/dmz/action_group plan \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -var="resource_group_name=$(DMZ_RESOURCE_GROUP)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  -out=ag_dmz.tfplan
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        displayName: "Terraform Apply - DMZ Action Group"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            terraform -chdir=terraform-scripts/dmz/action_group apply ag_dmz.tfplan
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            AG_ID=$(terraform -chdir=terraform-scripts/dmz/action_group output -raw action_group_id)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "##vso[task.setvariable variable=ACTION_GROUP_ID;isOutput=true]$AG_ID"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: ApplyActionGroup
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # Stage 2: Deploy DMZ VM Alerts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - stage: DeployVmAlerts_DMZ
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    displayName: "Deploy DMZ VM Alerts"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        dependsOn: DeployActionGroup_DMZ
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            variables:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ACTION_GROUP_ID: $[stageDependencies.DeployActionGroup_DMZ.TerraformActionGroup.outputs['ApplyActionGroup.ACTION_GROUP_ID']]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      jobs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - job: TerraformVmAlerts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    displayName: "Terraform - DMZ VM Alerts"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - task: TerraformInstaller@1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                terraformVersion: $(TF_VERSION)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      displayName: "Terraform Init - DMZ VM Alerts"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          terraform -chdir=terraform-scripts/dmz/vm-alerts init \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            -backend-config="storage_account_name=YOUR_STORAGE_ACCOUNT" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              -backend-config="container_name=tfstate-dmz" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -backend-config="key=dmz/vm-alerts/terraform.tfstate" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  -backend-config="resource_group_name=YOUR_RESOURCE_GROUP"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        displayName: "Terraform Plan - DMZ VM Alerts"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            terraform -chdir=terraform-scripts/dmz/vm-alerts plan \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              -var="resource_group_name=$(DMZ_RESOURCE_GROUP)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -var="action_group_id=$(ACTION_GROUP_ID)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  -out=alerts_dmz.tfplan
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - task: AzureCLI@2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        displayName: "Terraform Apply - DMZ VM Alerts"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    inputs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  azureSubscription: "YOUR_SERVICE_CONNECTION"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                scriptType: "bash"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              scriptLocation: "inlineScript"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            inlineScript: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            terraform -chdir=terraform-scripts/dmz/vm-alerts apply alerts_dmz.tfplan
